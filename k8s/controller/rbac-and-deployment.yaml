# ═══════════════════════════════════════════════════════════════════════════
# Canary Controller — RBAC + Job
# ═══════════════════════════════════════════════════════════════════════════
#
# Apply order:
#   1. ServiceAccount
#   2. Role  (namespace-scoped, least-privilege)
#   3. RoleBinding
#   4. ConfigMap
#   5. Job  (FIX: was Deployment — controller is run-once, not a daemon.
#             Deployment + restartPolicy:Always caused a restart loop when
#             no canary was deployed: NOT_FOUND → exit 2 → restart → repeat)
#
# Usage:
#   # Deploy canary image first, then trigger a fresh controller run:
#   kubectl apply -f rbac-and-deployment.yaml          # first-time setup
#   kubectl delete job canary-controller --ignore-not-found
#   kubectl apply -f rbac-and-deployment.yaml
#
#   kubectl logs -f job/canary-controller
# ═══════════════════════════════════════════════════════════════════════════

# ─── 1. ServiceAccount ────────────────────────────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: canary-controller
  namespace: default
  labels:
    app: canary-controller
automountServiceAccountToken: true

---
# ─── 2. Role (namespace-scoped) ───────────────────────────────────────────
# Controller sirf "default" namespace mein kaam karta hai — cluster-wide
# permissions unnecessary aur insecure hain. Role least-privilege enforce karta hai.
#
# Permission breakdown:
#   deployments (get/list)   → canary exist karta hai check karna
#   deployments (patch)      → stable ka image update karna (promotion)
#   deployments (delete)     → canary deployment hataana (rollback/promotion)
#   virtualservices (get)    → read-modify-write ke liye current state padhna
#   virtualservices (patch)  → traffic weights update karna
#
# FIX: pods (get/list) removed — _wait_for_canary_ready uses
#   read_namespaced_deployment (not pod listing), so this permission was
#   declared but never used. Removed to enforce least-privilege.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: canary-controller-role
  namespace: default
  labels:
    app: canary-controller
rules:

- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["get", "list", "patch", "delete"]

- apiGroups: ["networking.istio.io"]
  resources: ["virtualservices"]
  verbs: ["get", "patch"]

---
# ─── 3. RoleBinding (namespace-scoped) ────────────────────────────────────
# FIX: ClusterRoleBinding → RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: canary-controller-binding
  namespace: default
  labels:
    app: canary-controller
subjects:
- kind: ServiceAccount
  name: canary-controller
  namespace: default
roleRef:
  kind: Role
  name: canary-controller-role
  apiGroup: rbac.authorization.k8s.io

---
# ─── 4. ConfigMap ─────────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: canary-controller-config
  namespace: default
  labels:
    app: canary-controller
data:
  APP_NAME: "myapp"                 # ← APNA APP NAME
  NAMESPACE: "default"
  IN_CLUSTER: "true"
  PROMETHEUS_URL: "http://prometheus-operated.monitoring.svc.cluster.local:9090"

---
# ─── 5. Controller Job ────────────────────────────────────────────────────
# FIX: Deployment → Job
#
# The controller is run-once: it runs the full canary lifecycle (PROMOTED /
# ROLLEDBACK / NOT_FOUND) and exits. Using a Deployment with
# restartPolicy:Always caused an infinite restart loop when no canary was
# deployed — NOT_FOUND → exit 2 → Kubernetes restarts pod → repeat.
#
# With a Job (backoffLimit:0), the pod runs exactly once per apply.
# To trigger a new canary run:
#   kubectl delete job canary-controller --ignore-not-found
#   kubectl apply -f rbac-and-deployment.yaml
apiVersion: batch/v1
kind: Job
metadata:
  name: canary-controller
  namespace: default
  labels:
    app: canary-controller
  annotations:
    description: "Metrics-driven canary controller — BITS Dissertation 2024MT03065"
spec:
  backoffLimit: 0       # no retries — a failed run means rollback already happened
  ttlSecondsAfterFinished: 600   # auto-cleanup job 10 min after completion

  template:
    metadata:
      labels:
        app: canary-controller
      annotations:
        prometheus.io/scrape: "false"

    spec:
      serviceAccountName: canary-controller
      restartPolicy: Never    # Job semantics — never restart on exit

      containers:
      - name: controller
        image: YOUR_REGISTRY/canary-controller:v1   # ← APNA IMAGE (docker push ke baad)
        imagePullPolicy: Always

        envFrom:
        - configMapRef:
            name: canary-controller-config

        resources:
          requests:
            cpu: "50m"
            memory: "64Mi"
          limits:
            cpu: "100m"
            memory: "128Mi"

        # ── Liveness probe ────────────────────────────────────────────
        # FIX: PID file is now touched every evaluation step (see main.py),
        # not just written once at startup. A hanging process will stop
        # updating the file and the probe will fail → Kubernetes kills
        # and the Job records failure (no silent hang).
        livenessProbe:
          exec:
            command: ["test", "-f", "/tmp/controller.pid"]
          initialDelaySeconds: 20
          periodSeconds: 30
          failureThreshold: 3

      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
