# ═══════════════════════════════════════════════════════════════════════════
# Canary Controller — RBAC + Deployment
# ═══════════════════════════════════════════════════════════════════════════
#
# Apply order:
#   1. ServiceAccount
#   2. Role  (FIX: was ClusterRole — scoped to namespace now)
#   3. RoleBinding  (FIX: was ClusterRoleBinding)
#   4. ConfigMap
#   5. Deployment
#
# kubectl apply -f rbac-and-deployment.yaml
# kubectl rollout status deployment/canary-controller
# ═══════════════════════════════════════════════════════════════════════════

# ─── 1. ServiceAccount ────────────────────────────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: canary-controller
  namespace: default
  labels:
    app: canary-controller
automountServiceAccountToken: true

---
# ─── 2. Role (namespace-scoped) ───────────────────────────────────────────
# FIX: ClusterRole → Role
# Controller sirf "default" namespace mein kaam karta hai — cluster-wide
# permissions unnecessary aur insecure the. Role least-privilege enforce karta hai.
#
# Permission breakdown:
#   deployments (get/list)   → canary exist karta hai check karna
#   deployments (patch)      → stable ka image update karna (promotion)
#   deployments (delete)     → canary deployment hataana (rollback/promotion)
#   virtualservices (get)    → read-modify-write ke liye current state padhna
#   virtualservices (patch)  → traffic weights update karna
#   pods (get/list)          → readiness check ke liye
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: canary-controller-role
  namespace: default
  labels:
    app: canary-controller
rules:

- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["get", "list", "patch", "delete"]

- apiGroups: ["networking.istio.io"]
  resources: ["virtualservices"]
  verbs: ["get", "patch"]

- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list"]

---
# ─── 3. RoleBinding (namespace-scoped) ────────────────────────────────────
# FIX: ClusterRoleBinding → RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: canary-controller-binding
  namespace: default
  labels:
    app: canary-controller
subjects:
- kind: ServiceAccount
  name: canary-controller
  namespace: default
roleRef:
  kind: Role
  name: canary-controller-role
  apiGroup: rbac.authorization.k8s.io

---
# ─── 4. ConfigMap ─────────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: canary-controller-config
  namespace: default
  labels:
    app: canary-controller
data:
  APP_NAME: "myapp"                 # ← APNA APP NAME
  NAMESPACE: "default"
  IN_CLUSTER: "true"
  PROMETHEUS_URL: "http://prometheus-operated.monitoring.svc.cluster.local:9090"

---
# ─── 5. Controller Deployment ─────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: canary-controller
  namespace: default
  labels:
    app: canary-controller
  annotations:
    description: "Metrics-driven canary controller — BITS Dissertation 2024MT03065"
spec:
  replicas: 1     # sirf 1 — multiple controllers ek saath chalenge to conflict hoga

  selector:
    matchLabels:
      app: canary-controller

  strategy:
    type: Recreate    # controller restart hone pe purana band ho pehle

  template:
    metadata:
      labels:
        app: canary-controller
      annotations:
        prometheus.io/scrape: "false"

    spec:
      serviceAccountName: canary-controller
      restartPolicy: Always

      containers:
      - name: controller
        image: YOUR_REGISTRY/canary-controller:v1   # ← APNA IMAGE (docker push ke baad)
        imagePullPolicy: Always

        envFrom:
        - configMapRef:
            name: canary-controller-config

        resources:
          requests:
            cpu: "50m"
            memory: "64Mi"
          limits:
            cpu: "100m"
            memory: "128Mi"

        # ── Liveness probe ────────────────────────────────────────────
        # FIX: pehle wala probe sirf import check karta tha — process alive
        # nahi check karta tha. Ab main.py process ka PID file check hoga.
        # main.py startup pe /tmp/controller.pid likhta hai (see main.py).
        livenessProbe:
          exec:
            command: ["test", "-f", "/tmp/controller.pid"]
          initialDelaySeconds: 20
          periodSeconds: 30
          failureThreshold: 3

      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
