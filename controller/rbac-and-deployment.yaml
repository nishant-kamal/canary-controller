# ═══════════════════════════════════════════════════════════════════════════
# Canary Controller — RBAC + Deployment
# ═══════════════════════════════════════════════════════════════════════════
#
# Apply order:
#   1. ServiceAccount
#   2. ClusterRole
#   3. ClusterRoleBinding
#   4. ConfigMap
#   5. Deployment
#
# kubectl apply -f rbac-and-deployment.yaml
# kubectl rollout status deployment/canary-controller
# ═══════════════════════════════════════════════════════════════════════════

# ─── 1. ServiceAccount ────────────────────────────────────────────────────
# Controller pod is identity se chal raha hai
# K8s API calls is account ke naam pe hoti hain
apiVersion: v1
kind: ServiceAccount
metadata:
  name: canary-controller
  namespace: default
  labels:
    app: canary-controller
automountServiceAccountToken: true   # controller ko K8s API access chahiye

---
# ─── 2. ClusterRole ───────────────────────────────────────────────────────
# Principle of Least Privilege — sirf wahi permissions jo zaruri hain
#
# Permission breakdown:
#   deployments (get/list)   → canary exist karta hai check karna
#   deployments (patch)      → stable ka image update karna (promotion)
#   deployments (delete)     → canary deployment hataana (rollback/promotion)
#   virtualservices (get)    → current weights padhna
#   virtualservices (patch)  → traffic weights update karna
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: canary-controller-role
  labels:
    app: canary-controller
rules:

- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["get", "list", "patch", "delete"]

- apiGroups: ["networking.istio.io"]
  resources: ["virtualservices"]
  verbs: ["get", "patch"]

# Pod status dekhne ke liye (readiness check)
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list"]

---
# ─── 3. ClusterRoleBinding ────────────────────────────────────────────────
# ServiceAccount ko ClusterRole se bind karta hai
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: canary-controller-binding
  labels:
    app: canary-controller
subjects:
- kind: ServiceAccount
  name: canary-controller
  namespace: default
roleRef:
  kind: ClusterRole
  name: canary-controller-role
  apiGroup: rbac.authorization.k8s.io

---
# ─── 4. ConfigMap ─────────────────────────────────────────────────────────
# Controller config — yahan se tune karo, Dockerfile rebuild ki zarurat nahi
apiVersion: v1
kind: ConfigMap
metadata:
  name: canary-controller-config
  namespace: default
  labels:
    app: canary-controller
data:
  APP_NAME: "myapp"                 # ← APNA APP NAME
  NAMESPACE: "default"
  IN_CLUSTER: "true"
  PROMETHEUS_URL: "http://prometheus-operated.monitoring.svc.cluster.local:9090"

---
# ─── 5. Controller Deployment ─────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: canary-controller
  namespace: default
  labels:
    app: canary-controller
  annotations:
    description: "Metrics-driven canary controller — BITS Dissertation 2024MT03065"
spec:
  replicas: 1     # sirf 1 — multiple controllers ek saath chalenge to conflict hoga

  selector:
    matchLabels:
      app: canary-controller

  strategy:
    type: Recreate    # controller restart hone pe purana band ho pehle

  template:
    metadata:
      labels:
        app: canary-controller
      annotations:
        prometheus.io/scrape: "false"   # controller khud monitored nahi hoga

    spec:
      serviceAccountName: canary-controller

      # Controller restart hone pe turant wapas aaye
      restartPolicy: Always

      containers:
      - name: controller
        image: YOUR_REGISTRY/canary-controller:v1   # ← APNA IMAGE (docker push ke baad)
        imagePullPolicy: Always

        # ── Config from ConfigMap ──────────────────────────────────────
        envFrom:
        - configMapRef:
            name: canary-controller-config

        # ── Resources ─────────────────────────────────────────────────
        # Controller lightweight hai — sirf API calls karta hai
        resources:
          requests:
            cpu: "50m"
            memory: "64Mi"
          limits:
            cpu: "100m"
            memory: "128Mi"

        # ── Liveness probe ────────────────────────────────────────────
        # Agar controller hang ho jaye to pod restart ho
        livenessProbe:
          exec:
            command: ["python", "-c", "import kubernetes; import requests"]
          initialDelaySeconds: 20
          periodSeconds: 30
          failureThreshold: 3

      # ── Security context ──────────────────────────────────────────────
      securityContext:
        runAsNonRoot: true      # root ke roop mein nahi chalega
        runAsUser: 1000
